version: "3.9"

services:
  nanoclaw:
    build: .
    container_name: nanoclaw
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - nanoclaw-data:/app/data
      - nanoclaw-logs:/app/logs
    environment:
      # Required
      - WEB_DASHBOARD_PASSWORD=${WEB_DASHBOARD_PASSWORD}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}

      # Optional — multi-user (overrides WEB_DASHBOARD_PASSWORD if set)
      # - WEB_USERS=alice:pass1,bob:pass2

      # Optional — Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}

      # Optional — GitHub for agent git pushes
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-NanoClaw}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-nanoclaw@localhost}

      # Port (default 3000 — change the ports mapping above if you change this)
      - WEB_PORT=3000

volumes:
  nanoclaw-data:
  nanoclaw-logs:
