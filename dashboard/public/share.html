<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NanoClaw · Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:         #0e0e0e;
      --bg-alt:     #161616;
      --bg-deep:    #080808;
      --paper:      #e8e8e6;
      --paper-soft: rgba(232,232,230,0.62);
      --paper-dim:  rgba(232,232,230,0.36);
      --rule:       rgba(232,232,230,0.16);
      --rule-soft:  rgba(232,232,230,0.08);
      --signal:     #ff3b30;
      --signal-dim: rgba(255,59,48,0.18);
      --success:    #7ab06a;
      --warn:       #e8b04a;
      --info:       #5b9bb5;
      --mono: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
      --sans: 'Inter', 'Helvetica Neue', -apple-system, sans-serif;
      /* compat aliases */
      --accent: #ff3b30;
      --border: rgba(232,232,230,0.16);
      --text: #e8e8e6;
      --text-dim: rgba(232,232,230,0.36);
      --text-mid: rgba(232,232,230,0.62);
    }
    html, body { min-height: 100%; background: var(--bg); color: var(--paper); font-family: var(--sans); font-size: 13px; line-height: 1.5; }
    ::-webkit-scrollbar { width: 2px; height: 2px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--rule); }

    /* ── Topbar ── */
    #topbar {
      height: 44px; display: grid; grid-template-columns: auto 1fr auto;
      align-items: stretch; border-bottom: 1px solid var(--rule);
      position: sticky; top: 0; z-index: 20; background: var(--bg);
    }
    .tb-logo { display: flex; align-items: center; gap: 10px; padding: 0 16px; border-right: 1px solid var(--rule); }
    .tb-dot  { width: 8px; height: 8px; background: var(--signal); flex-shrink: 0; }
    .tb-name { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--paper); }
    .tb-ver  { font-family: var(--mono); font-size: 9px; color: var(--paper-dim); }
    .tb-mid  { display: flex; align-items: center; padding: 0 18px; }
    .tb-label { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--paper-dim); }
    .tb-actions { display: flex; align-items: center; gap: 10px; padding: 0 16px; border-left: 1px solid var(--rule); }
    .tb-link {
      font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--paper-dim); text-decoration: none;
      border: 1px solid var(--rule); padding: 4px 10px; transition: all .15s;
    }
    .tb-link:hover { border-color: var(--paper-soft); color: var(--paper); }

    /* ── Page ── */
    .page { max-width: 900px; margin: 0 auto; padding: 32px 28px 80px; display: flex; flex-direction: column; gap: 0; }

    /* ── Project header ── */
    .proj-head { padding: 28px 0 24px; border-bottom: 2px solid var(--paper); }
    .proj-eyebrow { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 2px; color: var(--signal); margin-bottom: 10px; text-transform: uppercase; }
    .proj-title-row { display: flex; align-items: flex-start; gap: 16px; }
    .proj-icon { font-size: 32px; line-height: 1; flex-shrink: 0; margin-top: 3px; text-shadow: 0 2px 8px rgba(0,0,0,0.4); }
    .proj-name { font-family: var(--sans); font-size: 38px; font-weight: 800; letter-spacing: -1.2px; line-height: 1; color: var(--paper); }
    .proj-meta { font-family: var(--mono); font-size: 10px; color: var(--paper-soft); letter-spacing: 1.4px; margin-top: 7px; text-transform: uppercase; }

    /* ── Stat strip ── */
    .stat-strip { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 1px; background: var(--rule); border: 1px solid var(--rule); margin-top: 20px; }
    .stat-cell { background: var(--bg); padding: 14px 16px; }
    .stat-label { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; color: var(--paper-dim); margin-bottom: 6px; }
    .stat-value { font-family: var(--mono); font-size: 20px; font-weight: 700; color: var(--paper); letter-spacing: -0.5px; }

    /* ── Report section ── */
    .sec-rule { display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--paper); padding-top: 8px; margin: 24px 0 16px; }
    .sec-rule-no    { font-family: var(--mono); font-size: 10px; color: var(--signal); letter-spacing: 1.5px; font-weight: 700; }
    .sec-rule-label { font-family: var(--mono); font-size: 10px; color: var(--paper); letter-spacing: 1.8px; font-weight: 700; text-transform: uppercase; }

    .report-wrap { border: 1px solid var(--rule); background: var(--bg-alt); padding: 24px 28px; font-size: 14px; line-height: 1.75; }

    .empty-state { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 40px; text-align: center; opacity: .4; }
    .empty-state .glyph { font-size: 36px; }
    .empty-state p { font-family: var(--mono); font-size: 11px; color: var(--paper-dim); letter-spacing: 1px; }

    /* ── Links ── */
    .links-wrap { display: flex; flex-wrap: wrap; gap: 8px; padding: 16px 0 0; }
    .link-pill {
      display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px;
      font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; background: transparent; border: 1px solid var(--rule);
      color: var(--paper-dim); text-decoration: none; transition: all .15s;
    }
    .link-pill:hover { border-color: var(--paper-soft); color: var(--paper); }
    .link-pill svg { width: 9px; height: 9px; fill: currentColor; flex-shrink: 0; }

    /* ── Footer ── */
    .share-footer {
      font-family: var(--mono); font-size: 9px; color: var(--paper-dim); letter-spacing: 1.2px;
      text-transform: uppercase; padding: 20px 0 0; text-align: center;
    }
    .share-footer a { color: var(--signal); text-decoration: none; }

    /* ── Loading / error ── */
    #loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 60vh; gap: 12px;
    }
    .load-spin { font-size: 24px; animation: spin .9s linear infinite; }
    .load-label { font-family: var(--mono); font-size: 10px; color: var(--paper-dim); letter-spacing: 2px; text-transform: uppercase; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-state { display: none; }
    #content { display: none; }

    /* ── Markdown ── */
    .report-wrap h1,.report-wrap h2,.report-wrap h3 { font-family: var(--sans); font-weight: 800; line-height: 1.3; margin: 20px 0 8px; }
    .report-wrap h1 { font-size: 22px; letter-spacing: -.5px; border-bottom: 1px solid var(--rule); padding-bottom: 8px; }
    .report-wrap h2 { font-size: 17px; letter-spacing: -.3px; }
    .report-wrap h3 { font-size: 14px; color: var(--signal); font-family: var(--mono); letter-spacing: .5px; text-transform: uppercase; }
    .report-wrap p { margin: 8px 0; }
    .report-wrap ul, .report-wrap ol { padding-left: 22px; margin: 8px 0; }
    .report-wrap li { margin: 4px 0; }
    .report-wrap strong { font-weight: 700; }
    .report-wrap em { font-style: italic; color: var(--paper-soft); }
    .report-wrap code {
      background: var(--rule-soft); padding: 2px 6px; font-size: 12px;
      font-family: var(--mono); color: var(--warn);
    }
    .report-wrap pre {
      background: var(--bg-deep); border: 1px solid var(--rule);
      padding: 14px 16px; margin: 12px 0; overflow-x: auto;
    }
    .report-wrap pre code { background: none; padding: 0; color: var(--paper-soft); }
    .report-wrap hr { border: none; border-top: 1px solid var(--rule); margin: 16px 0; }
    .report-wrap a { color: var(--signal); text-decoration: none; }
    .report-wrap a:hover { text-decoration: underline; }
    .report-wrap table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
    .report-wrap th {
      background: var(--bg-deep); padding: 8px 12px; text-align: left;
      font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--paper-dim); border: 1px solid var(--rule);
    }
    .report-wrap td { padding: 7px 12px; border: 1px solid var(--rule); color: var(--paper-soft); }
    .report-wrap tr:nth-child(even) td { background: var(--rule-soft); }
    .report-wrap blockquote {
      border-left: 3px solid var(--signal); background: var(--signal-dim);
      padding: 8px 14px; margin: 10px 0; color: var(--paper-soft);
    }
    .report-wrap img.md-img { max-width: 100%; max-height: 400px; object-fit: contain; display: block; margin: 10px 0; border: 1px solid var(--rule); }

    /* ── Product cards ── */
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1px; background: var(--rule); margin: 14px 0; border: 1px solid var(--rule); }
    .product-card { background: var(--bg); overflow: hidden; display: flex; flex-direction: column; transition: background .1s; }
    .product-card:hover { background: var(--bg-alt); }
    .pc-img { width: 100%; height: 160px; object-fit: cover; display: block; background: var(--rule-soft); }
    .pc-name { font-size: 14px; font-weight: 700; padding: 12px 14px 4px; line-height: 1.3; font-family: var(--sans); }
    .pc-line { font-size: 12px; color: var(--paper-soft); padding: 2px 14px; line-height: 1.5; }
    .pc-line strong { color: var(--paper); font-size: 14px; }
    .pc-link {
      display: block; margin: 10px 14px 14px; padding: 6px 12px;
      border: 1px solid var(--rule); font-family: var(--mono); font-size: 10px;
      font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      color: var(--paper-dim); text-decoration: none; text-align: center; transition: all .15s;
    }
    .pc-link:hover { border-color: var(--paper-soft); color: var(--paper); }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .page { padding: 20px 16px 60px; }
      .proj-name { font-size: 26px; }
      .proj-icon { font-size: 24px; }
      .report-wrap { padding: 16px; }
      .product-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 400px) {
      .tb-actions { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Topbar ── -->
<div id="topbar">
  <div class="tb-logo">
    <span class="tb-dot"></span>
    <span class="tb-name">NanoClaw</span>
    <span class="tb-ver">v3</span>
  </div>
  <div class="tb-mid">
    <span class="tb-label">Shared Project</span>
  </div>
  <div class="tb-actions">
    <a class="tb-link" href="/">Open Dashboard ↗</a>
  </div>
</div>

<!-- ── Loading ── -->
<div id="loading">
  <div class="load-spin">⟳</div>
  <div class="load-label">Loading…</div>
</div>

<!-- ── Error ── -->
<div id="error-state" class="page">
  <div style="text-align:center;padding:80px 20px">
    <div style="font-size:40px;margin-bottom:14px">🔍</div>
    <div style="font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--paper)">Project Not Found</div>
    <div style="font-family:var(--mono);font-size:10px;color:var(--paper-dim);margin-top:10px;letter-spacing:1px">This project may have been deleted or the link is invalid.</div>
  </div>
</div>

<!-- ── Content ── -->
<div id="content" class="page">

  <!-- Header -->
  <div class="proj-head">
    <div class="proj-eyebrow">NanoClaw · Shared Project</div>
    <div class="proj-title-row">
      <div class="proj-icon" id="share-icon"></div>
      <div>
        <div class="proj-name" id="share-name"></div>
        <div class="proj-meta" id="share-meta"></div>
      </div>
    </div>
    <div class="stat-strip" id="share-stats" style="display:none"></div>
  </div>

  <!-- Report -->
  <div class="sec-rule">
    <span class="sec-rule-no">§01</span>
    <span class="sec-rule-label">Full Report</span>
  </div>
  <div class="report-wrap" id="share-body">
    <div class="empty-state">
      <div class="glyph" id="share-empty-glyph">📋</div>
      <p>No report yet — open the dashboard and hit "Get Latest" to generate one.</p>
    </div>
  </div>

  <!-- Links -->
  <div class="links-wrap" id="share-links" style="display:none"></div>

  <!-- Footer -->
  <div class="share-footer">
    Powered by <a href="/">NanoClaw</a> · <span id="share-updated"></span>
  </div>
</div>

<script>
const EXT_ICON = `<svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>`;

function escHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMarkdown(raw) {
  const slots = [];
  const slot = (html) => { const id = `\x00${slots.length}\x00`; slots.push(html); return id; };
  const restore = (t) => slots.reduce((s, h, i) => s.split(`\x00${i}\x00`).join(h), t);
  let t = raw;
  t = t.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, c) => slot(`<pre><code>${escHtml(c.trim())}</code></pre>`));
  t = t.replace(/`([^`\n]+)`/g, (_, c) => slot(`<code>${escHtml(c)}</code>`));
  t = t.replace(/:::cards\n([\s\S]*?):::/g, (_, inner) => {
    const cards = inner.trim().split(/^---$/m);
    const html = cards.map(card => {
      let cardHtml = '';
      for (const line of card.trim().split('\n')) {
        const imgM  = line.match(/^!\[([^\]]*)\]\((https?:\/\/[^)]+)\)\s*$/);
        const h3M   = line.match(/^#{1,3}\s+(.+)$/);
        const linkM = line.match(/^\[([^\]]+)\]\((https?:\/\/[^)]+)\)\s*$/);
        if (imgM)   cardHtml += `<img src="${imgM[2]}" alt="${escHtml(imgM[1])}" loading="lazy" class="pc-img" onerror="this.style.display='none'">`;
        else if (h3M)  cardHtml += `<div class="pc-name">${escHtml(h3M[1])}</div>`;
        else if (linkM) cardHtml += `<a href="${linkM[2]}" target="_blank" rel="noopener" class="pc-link">${escHtml(linkM[1])}</a>`;
        else { let l = escHtml(line).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>'); if (l.trim()) cardHtml += `<div class="pc-line">${l}</div>`; }
      }
      return `<div class="product-card">${cardHtml}</div>`;
    }).join('');
    return slot(`<div class="product-grid">${html}</div>`);
  });
  t = t.replace(/!\[([^\]]*)\]\((https?:\/\/[^)\s"]+)\)/g, (_, alt, src) => slot(`<img src="${src}" alt="${escHtml(alt)}" loading="lazy" class="md-img" onerror="this.style.display='none'">`));
  t = t.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, (_, text, url) => slot(`<a href="${url}" target="_blank" rel="noopener">${escHtml(text)}</a>`));
  t = escHtml(t);
  t = t.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>');
  t = t.replace(/^---+$/gm,'<hr>');
  t = t.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/__(.+?)__/g,'<strong>$1</strong>').replace(/\*([^*\n]+)\*/g,'<em>$1</em>');
  t = t.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  t = t.replace(/((?:^\|.+\|\n?)+)/gm, (block) => {
    const rows = block.trim().split('\n').filter(r => r.trim());
    let html = '<div style="overflow-x:auto"><table>';
    rows.forEach((row, i) => {
      if (/^\|[-| :]+\|$/.test(row.trim())) return;
      const cells = row.split('|').slice(1,-1).map(c => c.trim());
      const tag = i === 0 ? 'th' : 'td';
      html += `<tr>${cells.map(c => `<${tag}>${c}</${tag}>`).join('')}</tr>`;
    });
    return html + '</table></div>';
  });
  t = t.replace(/^[ \t]*[-*] (.+)$/gm,'<li>$1</li>').replace(/(<li>.*<\/li>\n?)+/g,m=>`<ul>${m}</ul>`).replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  t = t.split(/\n{2,}/).map(block => {
    block = block.trim(); if (!block) return '';
    if (/^<(h[1-6]|ul|ol|pre|table|div|hr|blockquote)/.test(block) || block.includes('\x00')) return block;
    return `<p>${block.split('\n').map(l=>l.trim()).filter(Boolean).join('<br>')}</p>`;
  }).join('\n');
  return restore(t);
}

async function init() {
  const key = location.pathname.split('/').pop();
  if (!key) { showError(); return; }
  try {
    const res = await fetch(`/api/public/projects/${encodeURIComponent(key)}`, {
      headers: { 'ngrok-skip-browser-warning': '1' }
    });
    if (!res.ok) { showError(); return; }
    const { project, report } = await res.json();

    document.title = `${project.name} · NanoClaw`;
    document.getElementById('share-icon').textContent = project.icon || '📋';
    document.getElementById('share-empty-glyph').textContent = project.icon || '📋';
    const nameEl = document.getElementById('share-name');
    nameEl.textContent = project.name;
    if (project.nameColor) nameEl.style.color = project.nameColor;

    const metaEl = document.getElementById('share-meta');
    if (report && report.meta) {
      metaEl.textContent = report.meta;
      document.getElementById('share-updated').textContent = report.meta;
    } else {
      metaEl.textContent = 'No report yet';
    }

    // Stat strip
    if (project.stats && project.stats.length > 0 && report && report.stats) {
      const statsEl = document.getElementById('share-stats');
      statsEl.style.display = 'grid';
      statsEl.innerHTML = project.stats.map(s => `
        <div class="stat-cell">
          <div class="stat-label">${escHtml(s.label)}</div>
          <div class="stat-value">${escHtml(report.stats[s.id] || '—')}</div>
        </div>`).join('');
    }

    // Report body
    const bodyEl = document.getElementById('share-body');
    if (report && report.text) {
      bodyEl.innerHTML = renderMarkdown(report.text);
    }

    // Links
    if (project.links && project.links.length > 0) {
      const linksEl = document.getElementById('share-links');
      linksEl.style.display = 'flex';
      linksEl.innerHTML = project.links.map(l => {
        const safeUrl = /^https?:\/\//.test(l.url) ? escHtml(l.url) : '#';
        return `<a class="link-pill" href="${safeUrl}" target="_blank" rel="noopener">${EXT_ICON} ${escHtml(l.label)}</a>`;
      }).join('');
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'flex';
    document.getElementById('content').style.flexDirection = 'column';
  } catch {
    showError();
  }
}

function showError() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-state').style.display = 'flex';
}

init();
</script>
</body>
</html>
