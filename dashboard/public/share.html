<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NanoClaw · Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0c0e13;
      --card:      #10131a;
      --border:    rgba(255,255,255,0.07);
      --accent:    #4f8ef7;
      --text:      #dde2f0;
      --text-dim:  rgba(221,226,240,0.4);
      --text-mid:  rgba(221,226,240,0.65);
      --success:   #3ecf7a;
    }
    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; }

    /* ── Top bar ── */
    .topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 28px; border-bottom: 1px solid var(--border);
      background: var(--card); position: sticky; top: 0; z-index: 10;
    }
    .topbar-brand { font-size: 14px; font-weight: 800; letter-spacing: -.3px; }
    .topbar-brand em { color: var(--accent); font-style: normal; }
    .topbar-sep { width: 1px; height: 16px; background: var(--border); }
    .topbar-label { font-size: 11px; color: var(--text-dim); font-weight: 600; }
    .topbar-spacer { flex: 1; }
    .topbar-link {
      font-size: 11px; font-weight: 700; color: var(--accent);
      text-decoration: none; background: rgba(79,142,247,0.1);
      border: 1px solid rgba(79,142,247,0.25); border-radius: 7px;
      padding: 5px 12px; transition: background .15s;
    }
    .topbar-link:hover { background: rgba(79,142,247,0.18); }

    /* ── Page ── */
    .page { max-width: 860px; margin: 0 auto; padding: 40px 28px 80px; display: flex; flex-direction: column; gap: 24px; }

    /* ── Project header ── */
    .project-header { display: flex; align-items: flex-start; gap: 16px; }
    .project-icon-wrap { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
    .project-name { font-size: 26px; font-weight: 800; letter-spacing: -.6px; }
    .project-meta { font-size: 12px; color: var(--text-dim); margin-top: 4px; font-weight: 500; }

    /* ── Stat cards ── */
    .stat-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; }
    .stat-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
    .stat-value { font-size: 22px; font-weight: 800; letter-spacing: -.5px; }

    /* ── Report body ── */
    .report-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 26px 28px; font-size: 14px; line-height: 1.75; }
    .report-header { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .empty-state { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 40px; text-align: center; opacity: .4; }
    .empty-state .glyph { font-size: 36px; }
    .empty-state p { font-size: 13px; color: var(--text-dim); }

    /* ── Links ── */
    .links { display: flex; flex-wrap: wrap; gap: 8px; }
    .link-pill {
      display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px;
      border-radius: 20px; font-size: 11px; font-weight: 600;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: var(--text-mid); text-decoration: none; transition: all .15s;
    }
    .link-pill:hover { background: rgba(79,142,247,0.12); border-color: rgba(79,142,247,0.3); color: var(--accent); }
    .link-pill svg { width: 10px; height: 10px; fill: currentColor; }

    /* ── Footer ── */
    .share-footer { text-align: center; font-size: 11px; color: var(--text-dim); padding-top: 12px; }
    .share-footer a { color: var(--accent); text-decoration: none; }

    /* ── Loading / error ── */
    #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 40vh; gap: 12px; opacity: .4; }
    #loading .spin { font-size: 28px; animation: spin .9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-state { display: none; }
    #content  { display: none; }

    /* ── Markdown styles ── */
    .report-card h1,.report-card h2,.report-card h3 { margin: 16px 0 8px; font-weight: 700; line-height: 1.3; }
    .report-card h1 { font-size: 20px; } .report-card h2 { font-size: 16px; } .report-card h3 { font-size: 14px; color: var(--accent); }
    .report-card p { margin: 6px 0; }
    .report-card ul,.report-card ol { padding-left: 22px; margin: 8px 0; }
    .report-card li { margin: 4px 0; }
    .report-card strong { font-weight: 700; }
    .report-card em { font-style: italic; color: rgba(221,226,240,0.8); }
    .report-card code { background: rgba(255,255,255,0.07); padding: 2px 6px; border-radius: 5px; font-size: 12.5px; font-family: 'Fira Code','Courier New',monospace; }
    .report-card pre { background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin: 10px 0; overflow-x: auto; }
    .report-card pre code { background: none; padding: 0; }
    .report-card hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
    .report-card a { color: var(--accent); text-decoration: none; }
    .report-card a:hover { text-decoration: underline; }
    .report-card table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
    .report-card th { background: rgba(255,255,255,0.05); padding: 8px 12px; text-align: left; font-weight: 600; border: 1px solid var(--border); }
    .report-card td { padding: 7px 12px; border: 1px solid var(--border); }
    .report-card tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
    .report-card blockquote { border-left: 3px solid var(--accent); background: rgba(79,142,247,0.06); padding: 8px 14px; margin: 8px 0; color: var(--text-mid); border-radius: 0 8px 8px 0; }

    /* Product card grid */
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin: 14px 0; }
    .product-card { background: var(--bg); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; transition: border-color .2s; }
    .product-card:hover { border-color: rgba(255,255,255,0.14); }
    .pc-img { width: 100%; height: 160px; object-fit: cover; display: block; background: rgba(255,255,255,0.04); }
    .pc-name { font-size: 14px; font-weight: 700; padding: 12px 14px 4px; line-height: 1.3; }
    .pc-line { font-size: 12px; color: var(--text-mid); padding: 2px 14px; line-height: 1.5; }
    .pc-line strong { color: var(--text); font-size: 14px; }
    .pc-link { display: block; margin: 10px 14px 14px; padding: 8px 14px; background: rgba(79,142,247,0.1); border: 1px solid rgba(79,142,247,0.3); border-radius: 8px; font-size: 12px; font-weight: 700; color: var(--accent); text-decoration: none; text-align: center; transition: background .15s; }
    .pc-link:hover { background: rgba(79,142,247,0.2); }
    .md-img { max-width: 100%; max-height: 360px; border-radius: 10px; margin: 8px 0; object-fit: contain; display: block; }
    /* ── Responsive ── */
    @media (max-width: 600px) {
      .topbar { padding: 12px 16px; }
      .page { padding: 24px 16px 60px; gap: 18px; }
      .project-name { font-size: 20px; }
      .project-icon-wrap { width: 46px; height: 46px; font-size: 22px; }
      .stat-cards { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .product-grid { grid-template-columns: 1fr; }
      .report-card { padding: 18px 16px; }
    }
    @media (max-width: 400px) {
      .stat-value { font-size: 18px; }
      .topbar-link { display: none; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">Nano<em>Claw</em></div>
  <div class="topbar-sep"></div>
  <div class="topbar-label">Shared Project</div>
  <div class="topbar-spacer"></div>
  <a class="topbar-link" href="/">Open Dashboard</a>
</div>

<div id="loading">
  <div class="spin">⟳</div>
  <div style="font-size:13px;font-weight:600">Loading…</div>
</div>

<div id="error-state" class="page">
  <div style="text-align:center;padding:60px 20px;opacity:.5">
    <div style="font-size:40px;margin-bottom:12px">🔍</div>
    <div style="font-size:18px;font-weight:700">Project not found</div>
    <div style="font-size:13px;color:var(--text-dim);margin-top:8px">This project may have been deleted or the link is invalid.</div>
  </div>
</div>

<div id="content" class="page">
  <div class="project-header">
    <div class="project-icon-wrap" id="share-icon"></div>
    <div>
      <div class="project-name" id="share-name"></div>
      <div class="project-meta" id="share-meta"></div>
    </div>
  </div>
  <div class="stat-cards" id="share-stats" style="display:none"></div>
  <div class="report-card" id="share-body">
    <div class="empty-state">
      <div class="glyph" id="share-empty-glyph">📋</div>
      <p>No report available yet. Open the dashboard and hit "Get Latest" to generate one.</p>
    </div>
  </div>
  <div class="links" id="share-links" style="display:none"></div>
  <div class="share-footer">Powered by <a href="/">NanoClaw</a> · <span id="share-updated"></span></div>
</div>

<script>
const EXT_ICON = `<svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>`;

function escHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMarkdown(raw) {
  const slots = [];
  const slot = (html) => { const id = `\x00${slots.length}\x00`; slots.push(html); return id; };
  const restore = (t) => slots.reduce((s, h, i) => s.split(`\x00${i}\x00`).join(h), t);
  let t = raw;
  t = t.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, c) => slot(`<pre><code>${escHtml(c.trim())}</code></pre>`));
  t = t.replace(/`([^`\n]+)`/g, (_, c) => slot(`<code>${escHtml(c)}</code>`));
  t = t.replace(/:::cards\n([\s\S]*?):::/g, (_, inner) => {
    const cards = inner.trim().split(/^---$/m);
    const html = cards.map(card => {
      let cardHtml = '';
      for (const line of card.trim().split('\n')) {
        const imgM  = line.match(/^!\[([^\]]*)\]\((https?:\/\/[^)]+)\)\s*$/);
        const h3M   = line.match(/^#{1,3}\s+(.+)$/);
        const linkM = line.match(/^\[([^\]]+)\]\((https?:\/\/[^)]+)\)\s*$/);
        if (imgM)  cardHtml += `<img src="${imgM[2]}" alt="${escHtml(imgM[1])}" loading="lazy" class="pc-img" onerror="this.style.display='none'">`;
        else if (h3M)  cardHtml += `<div class="pc-name">${escHtml(h3M[1])}</div>`;
        else if (linkM) cardHtml += `<a href="${linkM[2]}" target="_blank" rel="noopener" class="pc-link">${escHtml(linkM[1])}</a>`;
        else { let l = escHtml(line).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>'); if(l.trim()) cardHtml += `<div class="pc-line">${l}</div>`; }
      }
      return `<div class="product-card">${cardHtml}</div>`;
    }).join('');
    return slot(`<div class="product-grid">${html}</div>`);
  });
  t = t.replace(/!\[([^\]]*)\]\((https?:\/\/[^)\s"]+)\)/g, (_, alt, src) => slot(`<img src="${src}" alt="${escHtml(alt)}" loading="lazy" class="md-img" onerror="this.style.display='none'">`));
  t = t.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, (_, text, url) => slot(`<a href="${url}" target="_blank" rel="noopener">${escHtml(text)}</a>`));
  t = escHtml(t);
  t = t.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>');
  t = t.replace(/^---+$/gm,'<hr>');
  t = t.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/__(.+?)__/g,'<strong>$1</strong>').replace(/\*([^*\n]+)\*/g,'<em>$1</em>');
  t = t.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  t = t.replace(/((?:^\|.+\|\n?)+)/gm, (block) => {
    const rows = block.trim().split('\n').filter(r=>r.trim());
    let html = '<div style="overflow-x:auto"><table>';
    rows.forEach((row,i) => { if(/^\|[-| :]+\|$/.test(row.trim())) return; const cells=row.split('|').slice(1,-1).map(c=>c.trim()); const tag=i===0?'th':'td'; html+=`<tr>${cells.map(c=>`<${tag}>${c}</${tag}>`).join('')}</tr>`; });
    return html+'</table></div>';
  });
  t = t.replace(/^[ \t]*[-*] (.+)$/gm,'<li>$1</li>').replace(/(<li>.*<\/li>\n?)+/g,m=>`<ul>${m}</ul>`).replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  t = t.split(/\n{2,}/).map(block => {
    block = block.trim(); if(!block) return '';
    if(/^<(h[1-6]|ul|ol|pre|table|div|hr|blockquote)/.test(block)||block.includes('\x00')) return block;
    return `<p>${block.split('\n').map(l=>l.trim()).filter(Boolean).join('<br>')}</p>`;
  }).join('\n');
  return restore(t);
}

async function init() {
  const key = location.pathname.split('/').pop();
  if (!key) { showError(); return; }

  try {
    const res = await fetch(`/api/public/projects/${encodeURIComponent(key)}`, { headers: { 'ngrok-skip-browser-warning': '1' } });
    if (!res.ok) { showError(); return; }
    const { project, report } = await res.json();

    document.title = `${project.name} · NanoClaw`;
    document.getElementById('share-icon').textContent = project.icon || '📋';
    document.getElementById('share-icon').style.background = project.accentBg || 'rgba(79,142,247,0.12)';
    document.getElementById('share-empty-glyph').textContent = project.icon || '📋';
    document.getElementById('share-name').textContent = project.name;
    document.getElementById('share-name').style.color = project.nameColor || 'var(--accent)';

    const metaEl = document.getElementById('share-meta');
    if (report && report.meta) {
      metaEl.textContent = report.meta;
      document.getElementById('share-updated').textContent = report.meta;
    } else {
      metaEl.textContent = 'No report yet';
    }

    // Stat cards
    if (project.stats && project.stats.length > 0 && report && report.stats) {
      const statsEl = document.getElementById('share-stats');
      statsEl.style.display = 'grid';
      statsEl.innerHTML = project.stats.map(s => `
        <div class="stat-card">
          <div class="stat-label">${escHtml(s.label)}</div>
          <div class="stat-value">${escHtml(report.stats[s.id] || '—')}</div>
        </div>`).join('');
    }

    // Report body
    const bodyEl = document.getElementById('share-body');
    if (report && report.text) {
      bodyEl.innerHTML = `<div class="report-header">NanoClaw · Full Report</div>${renderMarkdown(report.text)}`;
    }

    // Links
    if (project.links && project.links.length > 0) {
      const linksEl = document.getElementById('share-links');
      linksEl.style.display = 'flex';
      linksEl.innerHTML = project.links.map(l => {
        const safeUrl = /^https?:\/\//.test(l.url) ? escHtml(l.url) : '#';
        return `<a class="link-pill" href="${safeUrl}" target="_blank" rel="noopener">${EXT_ICON} ${escHtml(l.label)}</a>`;
      }).join('');
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'flex';
  } catch {
    showError();
  }
}

function showError() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-state').style.display = 'flex';
}

init();
</script>
</body>
</html>
